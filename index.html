/* ─── GuestCard ─────────────────────────────────────────────── */
function GuestCard({ guest, fromTable, onMouseDragStart, onTouchDragStart, onReturn, compact }) {
  const isN = guest.side === "novia";
  return (
    <div
      draggable
      onDragStart={(e) => { e.dataTransfer.effectAllowed = "move"; onMouseDragStart(guest.id, fromTable); }}
      onTouchStart={(e) => {
        const touch = e.touches[0];
        const rect = e.currentTarget.getBoundingClientRect();
        if (onTouchDragStart) onTouchDragStart(touch, rect, guest.id, fromTable);
      }}
      style={{
        padding: compact ? "3px 8px" : "7px 10px",
        borderRadius: "7px",
        background: isN ? C.noviaLt : C.novioLt,
        border: `1px solid ${isN ? C.noviaBd : C.novioBd}`,
        cursor: "grab",
        userSelect: "none", WebkitUserSelect: "none",
        WebkitTouchCallout: "none", WebkitTapHighlightColor: "transparent",
        marginBottom: "4px",
        display: "flex", alignItems: "center", gap: "6px", minWidth: 0,
      }}
    >
      <div style={{ width:"7px", height:"7px", borderRadius:"50%", background:isN?C.novia:C.novio, flexShrink:0 }} />
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ fontWeight:600, fontSize:compact?"11px":"13px", color:C.text, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
          {guest.name}
        </div>
        {!compact && (
          <div style={{ fontSize:"11px", color:C.mid, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
            {guest.rel}
          </div>
        )}
      </div>
      {!compact && (
        <span style={{ fontSize:"9px", fontWeight:800, padding:"2px 5px", borderRadius:"4px", background:isN?C.novia:C.novio, color:"#FFF", flexShrink:0 }}>
          {isN ? "MAGA" : "JUAN"}
        </span>
      )}
      {onReturn && (
        <button onClick={(e)=>{ e.stopPropagation(); onReturn(guest.id); }}
          style={{ background:"none", border:"none", cursor:"pointer", color:"#BBB", fontSize:"14px", padding:"0 2px", lineHeight:1, flexShrink:0 }}>×</button>
      )}
    </div>
  );
}

/* ─── TableCard ─────────────────────────────────────────────── */
function TableCard({ table, guests, isOver, onDrop, onRename, onRemove, onCapacityChange, onMouseDragStart, onTouchDragStart, onReturnGuest }) {
  const [editing, setEditing] = useState(false);
  const [nameVal, setNameVal] = useState(table.name);
  const [mouseOver, setMouseOver] = useState(false);
  const ref = useRef(null);
  const count = guests.length, cap = table.capacity;
  const pct = Math.min((count/cap)*100, 100), overCap = count > cap;
  const barColor = overCap?"#D03030":count>=cap*0.8?"#C08020":"#48A858";
  const over = mouseOver || isOver;

  return (
    <div
      ref={ref}
      data-dropzone={table.id}
      onDragEnter={() => setMouseOver(true)}
      onDragLeave={(e) => { if (!ref.current?.contains(e.relatedTarget)) setMouseOver(false); }}
      onDragOver={(e) => e.preventDefault()}
      onDrop={(e) => { e.preventDefault(); setMouseOver(false); onDrop(table.id); }}
      style={{
        background: over ? C.dropBg : C.card,
        border: `2px solid ${over ? C.dropBd : overCap ? "#D08080" : C.border}`,
        borderRadius:"12px", padding:"11px",
        transition:"border-color 0.12s,background 0.12s",
        boxShadow: over ? "0 0 0 3px rgba(58,136,216,0.15)" : "0 2px 6px rgba(0,0,0,0.05)",
      }}
    >
      {/* Header */}
      <div style={{ display:"flex", alignItems:"center", gap:"5px", marginBottom:"5px" }}>
        <span style={{ fontSize:"13px" }}>🪑</span>
        {editing ? (
          <input value={nameVal} onChange={(e)=>setNameVal(e.target.value)}
            onBlur={()=>{onRename(table.id,nameVal);setEditing(false);}}
            onKeyDown={(e)=>{if(e.key==="Enter")e.target.blur();if(e.key==="Escape"){setNameVal(table.name);setEditing(false);}}}
            autoFocus
            style={{ flex:1, border:"none", borderBottom:`2px solid ${C.gold}`, background:"transparent", fontSize:"12px", fontWeight:700, color:C.text, outline:"none", fontFamily:"inherit" }}
          />
        ) : (
          <div onDoubleClick={()=>{setNameVal(table.name);setEditing(true);}} title="Doble clic para renombrar"
            style={{ flex:1, fontWeight:700, fontSize:"12px", color:C.text, cursor:"text", userSelect:"none", WebkitUserSelect:"none" }}>
            {table.name}
          </div>
        )}
        <span style={{ fontSize:"11px", fontWeight:700, color:overCap?"#C03030":count>=cap*0.8?"#A06010":C.mid, whiteSpace:"nowrap" }}>
          {count}/{cap}
        </span>
        <button onClick={()=>onCapacityChange(table.id,cap-1)} disabled={cap<=1}
          style={{ background:"none", border:`1px solid ${C.border}`, borderRadius:"3px", cursor:cap>1?"pointer":"not-allowed", width:"15px", height:"15px", fontSize:"12px", lineHeight:"13px", color:C.mid, padding:0, flexShrink:0 }}>−</button>
        <button onClick={()=>onCapacityChange(table.id,cap+1)}
          style={{ background:"none", border:`1px solid ${C.border}`, borderRadius:"3px", cursor:"pointer", width:"15px", height:"15px", fontSize:"12px", lineHeight:"13px", color:C.mid, padding:0, flexShrink:0 }}>+</button>
        <button onClick={()=>onRemove(table.id)} title="Eliminar mesa"
          style={{ background:"none", border:"none", cursor:"pointer", color:"#C8C0B8", fontSize:"13px", padding:0, lineHeight:1, flexShrink:0 }}>🗑</button>
      </div>
      {/* Bar */}
      <div style={{ height:"3px", background:"#F0E4D4", borderRadius:"2px", marginBottom:"7px" }}>
        <div style={{ height:"100%", width:`${pct}%`, background:barColor, borderRadius:"2px", transition:"width 0.3s,background 0.3s" }} />
      </div>
      {/* Guests */}
      <div style={{ minHeight:"48px" }}>
        {guests.length === 0 ? (
          <div style={{ textAlign:"center", color:C.light, fontSize:"11px", padding:"12px 6px",
            border:`2px dashed ${over?C.dropBd:C.border}`, borderRadius:"7px",
            background:over?"rgba(58,136,216,0.04)":"transparent" }}>
            Arrastra invitados aquí
          </div>
        ) : (
          guests.map((g) => (
            <GuestCard key={g.id} guest={g} fromTable={table.id}
              onMouseDragStart={onMouseDragStart}
              onTouchDragStart={onTouchDragStart}
              onReturn={onReturnGuest} compact />
          ))
        )}
      </div>
    </div>
  );
}

function App() {
  const [tables, setTables] = useState([
    {id:"t1",  name:"Mesa de Honor", capacity:10},
    {id:"t2",  name:"Mesa 2",        capacity:10},
    {id:"t3",  name:"Mesa 3",        capacity:10},
    {id:"t4",  name:"Mesa 4",        capacity:10},

    {id:"t9",  name:"Mesa 9",        capacity:10},
    {id:"t10", name:"Mesa 10",       capacity:10},
    {id:"t11", name:"Mesa 11",       capacity:10},
  ]);
  const [assignments, setAssignments] = useState({});
  const [search, setSearch]       = useState("");
  const [sideFilter, setSideFilter] = useState("all");
  const [loading, setLoading]     = useState(false);
  const [toast, setToast]         = useState(null);
  const [poolMouseOver, setPoolMouseOver] = useState(false);
  const [touchOverId, setTouchOverId]     = useState(null); // table id or "pool" or null

  const poolRef     = useRef(null);
  const mouseDrag   = useRef(null);   // mouse DnD: { guestId, fromTable }
  const touchState  = useRef(null);   // touch DnD state
  const tablesRef   = useRef(tables);
  const assignRef   = useRef(assignments);
  const nextId      = useRef(12);
  const fileInput   = useRef(null);

  useEffect(() => { tablesRef.current = tables; },      [tables]);
  useEffect(() => { assignRef.current = assignments; }, [assignments]);

  /* ── Touch DnD: global listeners ── */
  useEffect(() => {
    const onMove = (e) => {
      const s = touchState.current;
      if (!s) return;

      const touch = e.touches[0];

      // ── Not dragging yet: check if finger moved (= user scrolling) ──
      if (!s.isDragging) {
        const dx = Math.abs(touch.clientX - s.startX);
        const dy = Math.abs(touch.clientY - s.startY);
        if (dx > 8 || dy > 8) {
          // Cancel pending long-press → let scroll happen
          clearTimeout(s.timer);
          touchState.current = null;
        }
        return; // don't prevent default → browser scrolls normally
      }

      // ── Dragging: move ghost ──
      e.preventDefault();
      s.ghost.style.left = (touch.clientX - s.offsetX) + "px";
      s.ghost.style.top  = (touch.clientY - s.offsetY) + "px";

      // Find drop zone under finger
      s.ghost.style.visibility = "hidden";
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      s.ghost.style.visibility = "visible";

      let node = el;
      while (node && !node.dataset.dropzone) node = node.parentElement;
      const target = node?.dataset.dropzone || null;

      if (target !== s.currentDropTarget) {
        s.currentDropTarget = target;
        setTouchOverId(target);
      }
    };

    const finalize = () => {
      const s = touchState.current;
      if (!s) return;
      clearTimeout(s.timer);
      if (s.ghost) s.ghost.remove();
      const { isDragging, guestId, currentDropTarget } = s;
      touchState.current = null;
      setTouchOverId(null);

      if (!isDragging || !currentDropTarget) return;
      const tableId = currentDropTarget === "pool" ? null : currentDropTarget;

      if (tableId !== null) {
        const t = tablesRef.current.find(x => x.id === tableId);
        if (!t) return;
        const cur = GUESTS.filter(g => assignRef.current[g.id] === tableId).length;
        if (cur >= t.capacity && assignRef.current[guestId] !== tableId) {
          setToast(`⚠️ ${t.name} está llena (${t.capacity}/${t.capacity})`);
          setTimeout(() => setToast(null), 2500);
          return;
        }
      }
      setAssignments(prev => {
        const next = { ...prev };
        if (tableId === null) delete next[guestId]; else next[guestId] = tableId;
        return next;
      });
    };

    document.addEventListener("touchmove",   onMove,    { passive: false });
    document.addEventListener("touchend",    finalize);
    document.addEventListener("touchcancel", finalize);
    return () => {
      document.removeEventListener("touchmove",   onMove);
      document.removeEventListener("touchend",    finalize);
      document.removeEventListener("touchcancel", finalize);
    };
  }, []); // stable: only uses refs + setAssignments + setToast + setTouchOverId

  /* ── Touch drag start (from GuestCard) ── */
  const handleTouchDragStart = (touch, rect, guestId, fromTable) => {
    if (touchState.current?.timer) clearTimeout(touchState.current.timer);

    const state = {
      guestId, fromTable,
      startX: touch.clientX, startY: touch.clientY,
      offsetX: touch.clientX - rect.left,
      offsetY: touch.clientY - rect.top,
      rect, ghost: null, isDragging: false,
      currentDropTarget: null, timer: null,
    };

    // Long-press timer: 400 ms
    state.timer = setTimeout(() => {
      if (!touchState.current || touchState.current !== state) return;
      state.isDragging = true;
      state.timer = null;

      const guest = GUESTS.find(g => g.id === guestId);
      if (!guest) return;
      const isN = guest.side === "novia";

      const ghost = document.createElement("div");
      ghost.innerHTML = `<div style="display:flex;align-items:center;gap:6px;"><div style="width:7px;height:7px;border-radius:50%;background:${isN?"#B84F6A":"#2E6FA8"};flex-shrink:0;"></div><span style="font-weight:600;font-size:13px;color:#281408;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${guest.name}</span></div>`;
      Object.assign(ghost.style, {
        position:"fixed", zIndex:"9999", pointerEvents:"none",
        left:(state.startX - state.offsetX)+"px",
        top :(state.startY - state.offsetY)+"px",
        width: state.rect.width+"px",
        background:isN?"#FDF0F4":"#EDF4FB",
        border:`1.5px solid ${isN?"#EDBBCA":"#B3CEED"}`,
        borderRadius:"7px", padding:"6px 10px", boxSizing:"border-box",
        fontFamily:"Georgia,'Times New Roman',serif",
        boxShadow:"0 12px 32px rgba(0,0,0,0.28)",
        transform:"rotate(-2deg) scale(1.05)",
      });
      document.body.appendChild(ghost);
      state.ghost = ghost;

      if (navigator.vibrate) navigator.vibrate(15);
    }, 400);

    touchState.current = state;
  };

  /* ── Mouse DnD helpers ── */
  const handleMouseDrop = (targetId) => {
    if (!mouseDrag.current) return;
    moveGuest(mouseDrag.current.guestId, targetId);
    mouseDrag.current = null;
  };

  /* ── Move guest (shared) ── */
  const moveGuest = (guestId, tableId) => {
    if (tableId !== null) {
      const t = tables.find(x => x.id === tableId);
      if (!t) return;
      const cur = GUESTS.filter(g => assignments[g.id] === tableId).length;
      if (cur >= t.capacity && assignments[guestId] !== tableId) {
        showToast(`⚠️ ${t.name} está llena (${t.capacity}/${t.capacity})`); return;
      }
    }
    setAssignments(prev => {
      const next = { ...prev };
      if (tableId === null) delete next[guestId]; else next[guestId] = tableId;
      return next;
    });
  };

  const showToast = (msg, ms=2500) => { setToast(msg); setTimeout(()=>setToast(null),ms); };

  const addTable = () => {
    const id = `t${nextId.current}`;
    setTables(p=>[...p,{id,name:`Mesa ${nextId.current}`,capacity:10}]);
    nextId.current++;
  };
  const removeTable = (tid) => {
    setTables(p=>p.filter(t=>t.id!==tid));
    setAssignments(p=>{ const n={...p}; Object.keys(n).forEach(k=>{if(n[k]===tid)delete n[k];}); return n; });
  };

  /* ── Derived ── */
  const getTableGuests = (tid) => GUESTS.filter(g => assignments[g.id] === tid);
  const unassigned = GUESTS.filter(g => !assignments[g.id]);
  const filtered = unassigned.filter(g => {
    const q = search.toLowerCase();
    return (g.name.toLowerCase().includes(q)||g.rel.toLowerCase().includes(q))
      && (sideFilter==="all"||g.side===sideFilter);
  });
  const assigned = Object.keys(assignments).length;

  /* ── Export ── */
  const exportExcel = () => {
    const wb = XLSX.utils.book_new();
    const rows=[["Mesa","Nombre","Parentesco / Relación","Familia"]];
    tables.forEach(t=>{
      const tg=getTableGuests(t.id); if(!tg.length)return;
      tg.forEach(g=>rows.push([t.name,g.name,g.rel,g.side==="novia"?"Novia (Magaly)":"Novio (Juan)"]));
      rows.push([]);
    });
    const ug=GUESTS.filter(g=>!assignments[g.id]);
    if(ug.length){ rows.push(["SIN ASIGNAR","","",""]); ug.forEach(g=>rows.push(["",g.name,g.rel,g.side==="novia"?"Novia (Magaly)":"Novio (Juan)"])); }
    const ws1=XLSX.utils.aoa_to_sheet(rows);
    ws1["!cols"]=[{width:22},{width:24},{width:42},{width:18}];
    XLSX.utils.book_append_sheet(wb,ws1,"Distribución");

    const state=[
      ["MESAS","",""],["id","nombre","capacidad"],
      ...tables.map(t=>[t.id,t.name,t.capacity]),
      [],["ASIGNACIONES",""],["id_invitado","id_mesa"],
      ...Object.entries(assignments).map(([gId,tId])=>[parseInt(gId),tId]),
    ];
    const ws2=XLSX.utils.aoa_to_sheet(state);
    ws2["!cols"]=[{width:14},{width:26},{width:12}];
    XLSX.utils.book_append_sheet(wb,ws2,"Estado_App");

    XLSX.writeFile(wb,"mesas_matrimonio_magaly_juan.xlsx");
    showToast("📊 Excel guardado correctamente");
  };

  /* ── Import ── */
  const handleFileImport = (e) => {
    const file=e.target.files[0]; if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const wb=XLSX.read(new Uint8Array(ev.target.result),{type:"array"});
        const ws=wb.Sheets["Estado_App"];
        if(!ws){showToast("❌ Archivo no reconocido. Usa uno exportado desde esta app.");return;}
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
        let i=0; const newTables=[],newAssign={};
        while(i<rows.length&&String(rows[i][0]).toUpperCase()!=="MESAS")i++;
        i+=2;
        while(i<rows.length&&rows[i][0]!==""&&String(rows[i][0]).toUpperCase()!=="ASIGNACIONES"){
          const[id,name,cap]=rows[i];
          if(id!==""&&name!=="")newTables.push({id:String(id),name:String(name),capacity:parseInt(cap)||10});
          i++;
        }
        while(i<rows.length&&String(rows[i][0]).toUpperCase()!=="ASIGNACIONES")i++;
        i+=2;
        while(i<rows.length&&rows[i][0]!==""){
          const[gId,tId]=rows[i];
          if(gId!==""&&tId!==""){
            const gIdN=parseInt(gId);
            if(GUESTS.find(g=>g.id===gIdN)&&newTables.find(t=>t.id===String(tId)))
              newAssign[gIdN]=String(tId);
          }
          i++;
        }
        if(!newTables.length){showToast("❌ No se encontraron mesas en el archivo.");return;}
        const maxN=newTables.reduce((m,t)=>{ const n=parseInt(t.id.replace(/\D/g,"")); return isNaN(n)?m:Math.max(m,n); },0);
        nextId.current=maxN+1;
        setTables(newTables); setAssignments(newAssign);
        showToast(`✅ Cargado: ${newTables.length} mesas, ${Object.keys(newAssign).length} invitados asignados`,3500);
      }catch(err){console.error(err);showToast("❌ Error al leer el archivo.",3000);}
      e.target.value="";
    };
    reader.readAsArrayBuffer(file);
  };

  /* ── AI suggest ── */
  const suggestSeating = async () => {
    setLoading(true);
    try{
      const gList=GUESTS.map(g=>`${g.id}|${g.name}|${g.rel}|${g.side}`).join("\n");
      const tList=tables.map(t=>`${t.id}: ${t.name} (max ${t.capacity})`).join("\n");
      const prompt=`Eres organizador de bodas. Asigna los ${GUESTS.length} invitados a las mesas.
Reglas: 1)Parejas/familias juntas 2)Adultos mayores cómodos 3)Niños(👶) cerca de padres 4)Compañeros trabajo novia juntos 5)Compañeros trabajo novio juntos 6)Coro juntos 7)Novios+padres+hermanos→Mesa de Honor 8)No excedas capacidad
Invitados(id|nombre|parentesco|lado):\n${gList}\nMesas:\n${tList}
RESPONDE SOLO JSON:{"id_invitado":"id_mesa",...} sin texto extra.`;
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]}),
      });
      const data=await res.json();
      const raw=(data.content.find(c=>c.type==="text")?.text||"{}").replace(/```json|```/g,"").trim();
      const parsed=JSON.parse(raw);
      const next={};
      for(const[gId,tId] of Object.entries(parsed)){
        const g=GUESTS.find(x=>x.id===parseInt(gId));
        const t=tables.find(x=>x.id===tId);
        if(g&&t)next[g.id]=tId;
      }
      setAssignments(next);
      showToast(`✅ IA asignó ${Object.keys(next).length}/${GUESTS.length} invitados`,3000);
    }catch(err){console.error(err);showToast("❌ Error al generar sugerencia.",3500);}
    setLoading(false);
  };

  /* ── Render ── */
  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100vh", background:C.bg, fontFamily:"'Georgia','Times New Roman',serif", color:C.text }}>

      {toast && (
        <div style={{ position:"fixed", top:14, right:14, zIndex:9999, background:"#281408", color:"#FFF", padding:"9px 16px", borderRadius:"9px", fontSize:"13px", fontWeight:500, boxShadow:"0 4px 20px rgba(0,0,0,0.3)" }}>
          {toast}
        </div>
      )}

      <input ref={fileInput} type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={handleFileImport} />

      {/* Header */}
      <div style={{ background:"#FFF", borderBottom:`1px solid ${C.border}`, padding:"9px 18px", display:"flex", alignItems:"center", gap:"8px", flexShrink:0, flexWrap:"wrap" }}>
        <div>
          <div style={{ fontWeight:700, fontSize:"15px" }}>💒 Magaly &amp; Juan — Distribución de Mesas</div>
          <div style={{ fontSize:"11px", color:C.mid, marginTop:"1px" }}>
            <span style={{ color:assigned===GUESTS.length?"#409040":C.novia, fontWeight:700 }}>{assigned}/{GUESTS.length} asignados</span>
            {" · "}{unassigned.length} sin asignar{" · "}{tables.length} mesas
          </div>
        </div>
        <div style={{flex:1}}/>
        <button onClick={suggestSeating} disabled={loading} style={btn(C.gold,loading)}>
          {loading?"⏳ Generando...":"✨ Sugerir con IA"}
        </button>
        <button onClick={addTable} style={btn("#4A82B0")}>+ Mesa</button>
        <button onClick={()=>{setAssignments({});showToast("↺ Asignaciones limpiadas");}} style={btn("#9A8878")}>↺ Limpiar</button>
        <div style={{width:"1px",height:"28px",background:C.border,margin:"0 2px"}}/>
        <button onClick={exportExcel} disabled={assigned===0} style={btn("#3A7840",assigned===0)} title="Guarda el estado para recargar">⬇ Guardar Excel</button>
        <button onClick={()=>fileInput.current?.click()} style={btn("#6055A0")} title="Carga un Excel guardado">📂 Cargar Excel</button>
      </div>

      {/* Tip */}
      <div style={{ background:"#FDF8F0", borderBottom:`1px solid ${C.border}`, padding:"5px 18px", fontSize:"11px", color:C.mid, display:"flex", alignItems:"center", gap:"6px", flexShrink:0 }}>
        <span>📱</span>
        <span><strong>iPhone:</strong> mantén presionado un invitado (~1 seg) para activar el arrastre.</span>
      </div>

      {/* Body */}
      <div style={{ display:"flex", flex:1, overflow:"hidden" }}>

        {/* Pool */}
        <div style={{ width:"265px", flexShrink:0, background:"#FFF", borderRight:`1px solid ${C.border}`, display:"flex", flexDirection:"column" }}>
          <div style={{ padding:"11px 13px", borderBottom:`1px solid ${C.border}` }}>
            <div style={{ fontWeight:700, fontSize:"12px", marginBottom:"7px" }}>Sin asignar ({unassigned.length})</div>
            <input value={search} onChange={(e)=>setSearch(e.target.value)} placeholder="🔍 Buscar..."
              style={{ width:"100%", padding:"5px 9px", borderRadius:"7px", border:`1px solid ${C.border}`, fontSize:"12px", boxSizing:"border-box", background:C.bg, outline:"none", color:C.text, fontFamily:"inherit" }}
            />
            <div style={{ display:"flex", gap:"4px", marginTop:"7px" }}>
              {[{k:"all",label:"Todos",color:C.gold},{k:"novia",label:"💗 Magaly",color:C.novia},{k:"novio",label:"💙 Juan",color:C.novio}].map(({k,label,color})=>(
                <button key={k} onClick={()=>setSideFilter(k)}
                  style={{ flex:1, padding:"4px 2px", borderRadius:"6px", border:`1px solid ${sideFilter===k?color:C.border}`, cursor:"pointer", fontSize:"10px", fontWeight:700, background:sideFilter===k?color:"transparent", color:sideFilter===k?"#FFF":C.mid, transition:"all 0.12s", fontFamily:"inherit" }}>
                  {label}
                </button>
              ))}
            </div>
          </div>

          <div
            ref={poolRef}
            data-dropzone="pool"
            onDragEnter={()=>setPoolMouseOver(true)}
            onDragLeave={(e)=>{ if(!poolRef.current?.contains(e.relatedTarget)) setPoolMouseOver(false); }}
            onDragOver={(e)=>e.preventDefault()}
            onDrop={(e)=>{ e.preventDefault(); setPoolMouseOver(false); handleMouseDrop(null); }}
            style={{ flex:1, overflowY:"auto", padding:"10px 12px", background:(poolMouseOver||touchOverId==="pool")?C.dropBg:"transparent", transition:"background 0.12s" }}
          >
            {filtered.length === 0 ? (
              <div style={{ textAlign:"center", color:C.light, padding:"22px 8px", fontSize:"12px" }}>
                {unassigned.length===0?"🎉 ¡Todos asignados!":"Sin coincidencias"}
              </div>
            ) : (
              filtered.map(g=>(
                <GuestCard key={g.id} guest={g} fromTable={null}
                  onMouseDragStart={(gId,from)=>{ mouseDrag.current={guestId:gId,fromTable:from}; }}
                  onTouchDragStart={handleTouchDragStart}
                />
              ))
            )}
          </div>
        </div>

        {/* Tables */}
        <div style={{ flex:1, overflowY:"auto", padding:"15px 18px" }}>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(265px,1fr))", gap:"13px", alignContent:"start" }}>
            {tables.map(t=>(
              <TableCard key={t.id} table={t} guests={getTableGuests(t.id)}
                isOver={touchOverId === t.id}
                onDrop={handleMouseDrop}
                onRename={(id,name)=>setTables(p=>p.map(x=>x.id===id?{...x,name}:x))}
                onRemove={removeTable}
                onCapacityChange={(id,cap)=>{ if(cap>=1) setTables(p=>p.map(x=>x.id===id?{...x,capacity:cap}:x)); }}
                onMouseDragStart={(gId,from)=>{ mouseDrag.current={guestId:gId,fromTable:from}; }}
                onTouchDragStart={handleTouchDragStart}
                onReturnGuest={gId=>moveGuest(gId,null)}
              />
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
